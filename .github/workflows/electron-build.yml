name: Build Electron App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: dist/installer/*.exe
          - os: ubuntu-latest
            platform: linux
            artifact: dist/installer/*.AppImage
          - os: macos-latest
            platform: mac
            artifact: dist/installer/*.dmg

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: artifacts/tower-defense-fps
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # pnpm-workspace.yaml overrides exclude all platform-specific native
      # binaries (rollup, esbuild, tailwindcss-oxide…) to save disk on Replit.
      # Strip the overrides section so pnpm resolves the correct binaries for
      # this runner's platform.
      - name: Remove platform-exclusion overrides
        shell: bash
        working-directory: .
        run: |
          node -e "
            const fs = require('fs');
            const path = 'pnpm-workspace.yaml';
            let text = fs.readFileSync(path, 'utf8');
            text = text.replace(/\noverrides:[\s\S]*/, '');
            fs.writeFileSync(path, text);
            console.log('overrides removed');
          "

      - name: Install dependencies
        shell: bash
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Build renderer + Electron main
        run: node build-electron.mjs

      - name: Package installer
        run: pnpm electron-builder --config electron-builder.yml --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: tower-defense-fps-${{ matrix.platform }}
          path: artifacts/tower-defense-fps/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
          draft: false
