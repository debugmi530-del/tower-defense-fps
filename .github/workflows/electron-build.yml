name: Build Electron App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: dist/installer/*.exe
          - os: ubuntu-latest
            platform: linux
            artifact: dist/installer/*.AppImage
          - os: macos-latest
            platform: mac
            artifact: dist/installer/*.dmg

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: artifacts/tower-defense-fps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # The root pnpm-workspace.yaml excludes all platform-specific native
      # binaries (rollup, esbuild, etc.) to save disk space on Replit/Linux.
      # Strip the entire overrides section so pnpm can install the correct
      # binaries for this CI runner's platform.
      - name: Remove platform-exclusion overrides
        run: |
          python3 - <<'EOF'
          import re
          path = 'pnpm-workspace.yaml'
          text = open(path).read()
          # Drop everything from the first "overrides:" line to end of file
          text = re.sub(r'\noverrides:.*', '', text, flags=re.DOTALL)
          open(path, 'w').write(text)
          print("overrides section removed")
          EOF
        working-directory: .

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: .

      - name: Build renderer + Electron main
        run: node build-electron.mjs

      - name: Package installer
        run: pnpm electron-builder --config electron-builder.yml --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: tower-defense-fps-${{ matrix.platform }}
          path: artifacts/tower-defense-fps/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
          draft: false
